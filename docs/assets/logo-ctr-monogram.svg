<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">CyberTender Radar CTR monogram logo</title>
  <desc id="desc">A compact CTR monogram built from cyber signal lines.</desc>
  <defs>
    <linearGradient id="bg" x1="32" y1="28" x2="226" y2="226" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#102f56"/>
      <stop offset="1" stop-color="#061225"/>
    </linearGradient>
    <filter id="softGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="28" y="28" width="200" height="200" rx="40" fill="url(#bg)" stroke="#24d9ff" stroke-width="7"/>
  <path d="M70 80h116M70 128h84M70 176h116" stroke="#163f64" stroke-width="7" stroke-linecap="round"/>
  <text x="128" y="149" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="70" font-weight="900" fill="#effcff" filter="url(#softGlow)">CTR</text>
  <path d="M58 58h44M58 58v44M154 198h44M198 154v44" stroke="#24d9ff" stroke-width="7" stroke-linecap="round"/>
  <circle cx="196" cy="62" r="8" fill="#24d9ff"/>
  <circle cx="60" cy="196" r="8" fill="#24d9ff"/>
</svg>
