  <circle cx="128" cy="130" r="18" fill="none" stroke="#e8fbff" stroke-width="7"/>
  <circle cx="128" cy="130" r="43" fill="none" stroke="#24d9ff" stroke-width="5" opacity=".72"/>
  <circle cx="128" cy="130" r="69" fill="none" stroke="#24d9ff" stroke-width="4" opacity=".32"/>
  <path d="M128 130 184 79a76 76 0 0 1 18 51h-74Z" fill="url(#sweep)" filter="url(#glow)" opacity=".95"/>
  <path d="M76 184h104" stroke="#e8fbff" stroke-width="8" stroke-linecap="round"/>
  <path d="M93 203h70" stroke="#24d9ff" stroke-width="6" stroke-linecap="round"/>
</svg>
