name: Refresh CyberTender Radar

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh public feed
        run: python scripts/fetch_opportunities.py
        env:
          SAM_API_KEY: ${{ secrets.SAM_API_KEY }}

      - name: Commit refreshed feed
        run: |
          git config user.name "cybertender-radar-bot"
          git config user.email "cybertender-radar-bot@users.noreply.github.com"
          git add docs/data data
          if git diff --cached --quiet; then
            echo "No feed changes to commit."
          else
            git commit -m "Refresh CyberTender Radar feed"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy Pages
        id: deploy
        uses: actions/deploy-pages@v5
