name: Refresh CyberTender Radar

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1-5"

permissions:
  contents: write
  pages: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh public feed
        run: |
          python scripts/fetch_opportunities.py
          python scripts/build_outreach_draft_queue.py
          python scripts/build_followup_draft_queue.py
          python scripts/build_sales_packet.py
          python scripts/build_kpi_snapshot.py
        env:
          SAM_API_KEY: ${{ secrets.SAM_API_KEY }}

      - name: Commit refreshed feed
        run: |
          git config user.name "cybertender-radar-bot"
          git config user.email "cybertender-radar-bot@users.noreply.github.com"
          git add docs data business/daily_sales_packet.md business/kpi_snapshot.md business/outreach_followups_due.csv business/outreach_draft_queue.csv business/outreach_draft_queue.md business/followup_draft_queue.csv business/followup_draft_queue.md
          if git diff --cached --quiet; then
            echo "No feed changes to commit."
          else
            git commit -m "Refresh CyberTender Radar feed"
            git push
          fi

      - name: Request Pages rebuild
        run: |
          curl --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $GITHUB_TOKEN" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/pages/builds" > /dev/null
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
